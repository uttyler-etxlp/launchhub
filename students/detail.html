<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student | LaunchHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8F6F3]">

<div class="max-w-4xl mx-auto p-6">

  <a href="./index.html" class="text-blue-600 text-sm">
    &larr; Back to Students
  </a>

  <div id="studentDetail" class="mt-6"></div>

</div>

<script>
const BASE = "../content";

// Get ID from URL
const params = new URLSearchParams(window.location.search);
const studentId = params.get("id");

console.log("Student ID:", studentId);

async function loadDetail() {
  try {
    // Load students
    const sIndexRes = await fetch(BASE + "/students/index.json");
    const sFiles = await sIndexRes.json();

    let student = null;

    for (let file of sFiles) {
      const res = await fetch(BASE + "/students/" + file);
      const s = await res.json();

      if ((s.id || "").trim() === (studentId || "").trim()) {
        student = s;
        break;
      }
    }

    if (!student) {
      document.getElementById("studentDetail").innerHTML =
        "<p>Student not found.</p>";
      return;
    }

    // Load ventures
    const vIndexRes = await fetch(BASE + "/ventures/index.json");
    const vFiles = await vIndexRes.json();

    const ventures = [];

    for (let file of vFiles) {
      const res = await fetch(BASE + "/ventures/" + file);
      const v = await res.json();

      if ((v.owner_student_id || "").trim() === student.id.trim()) {
        ventures.push(v);
      }
    }

    render(student, ventures);

  } catch (err) {
    console.error(err);
    document.getElementById("studentDetail").innerHTML =
      "<p>Error loading student.</p>";
  }
}

function render(s, ventures) {
  let ventureHTML = "";

  if (ventures.length > 0) {
    ventureHTML = ventures.map(v => `
      <a href="../ventures/detail.html?id=${v.id}" class="block mt-2 text-sm text-gray-500'>No ventures yet.</p>";
  }

  document.getElementById("studentDetail").innerHTML = `
    <div class="bg-white p-6 rounded-lg shadow">

      <h1 class="text-3xl font-bold text-[#002F6C] mb-2">
        ${s.name}
      </h1>

      <p class="text-sm text-gray-500 mb-4">
        ${s.major || ""}
      </p>

      <p class="text-gray-700">
        ${s.bio || ""}
      </p>

      ${
        s.linkedin
          ? `${s.linkedin}
               LinkedIn →
             </a>`
          : ""
      }

      <hr class="my-6">

      <h2 class="text-xl font-semibold mb-2">
        Ventures
      </h2>

      ${ventureHTML}

    </div>
  `;
}

// Run it
loadDetail();
</script>

</body>
</html>
``
