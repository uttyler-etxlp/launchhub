<!DOCTYPE html>
<html>
<head>
  <title>Students | LaunchHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8F6F3]">

<div class="max-w-6xl mx-auto p-6">

  <h1 class="text-4xl font-bold text-[#002F6C] mb-8">
    Students
  </h1>

  <div id="students" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>
const BASE = "../content";

async function loadStudents() {
  try {
    const indexRes = await fetch(BASE + "/students/index.json");
    
    if (!indexRes.ok) {
      throw new Error("Failed to load index.json");
    }

    const files = await indexRes.json();

    const students = [];

    for (let file of files) {
      const res = await fetch(BASE + "/students/" + file);

      if (!res.ok) {
        console.error("Failed to load:", file);
        continue;
      }

      const data = await res.json();

      if (!data.placeholder) {
        students.push(data);
      }
    }

    render(students);

  } catch (err) {
    console.error(err);
    document.getElementById("students").innerHTML =
      "<p>Error loading students. Check console.</p>";
  }
}

function render(students) {
  if (students.length === 0) {
    document.getElementById("students").innerHTML =
      "<p>No students found yet.</p>";
    return;
  }

  let html = "";

  students.forEach(s => {
    html += `
      <div class="bg-white p-5 rounded-lg shadow">
        <h2 class="text-xl font-semibold text-[#002F6C]">
          ${s.name || "Unnamed"}
        </h2>

        <p class="text-sm text-gray-500">
          ${s.major || ""}
        </p>

        <p class="mt-3 text-sm">
          ${s.bio || ""}
        </p>
      </div>
    `;
  });

  document.getElementById("students").innerHTML = html;
}

loadStudents();
</script>

</body>
</html>
