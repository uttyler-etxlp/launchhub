<!DOCTYPE html>
<html>
<head>
  <title>Ventures | LaunchHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8F6F3]">

<div class="max-w-6xl mx-auto p-6">

  <h1 class="text-4xl font-bold text-[#002F6C] mb-8">
    Ventures
  </h1>

  <div id="ventures" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>
const BASE = "../content";

async function loadData() {
  try {
    // load ventures index
    const indexRes = await fetch(BASE + "/ventures/index.json");
    if (!indexRes.ok) throw new Error("Missing ventures index.json");

    const ventureFiles = await indexRes.json();

    // load students
    const studentIndexRes = await fetch(BASE + "/students/index.json");
    const studentFiles = await studentIndexRes.json();

    const students = {};

    for (let f of studentFiles) {
      const res = await fetch(BASE + "/students/" + f);
      if (!res.ok) continue;

      const s = await res.json();
      if (!s.placeholder) {
        students[s.id] = s;
      }
    }

    // load ventures
    const ventures = [];
    
    for (let file of ventureFiles) {
      const res = await fetch(BASE + "/ventures/" + file);
      if (!res.ok) {
        console.error("Missing venture file:", file);
        continue;
      }

      const v = await res.json();

      if (!v.placeholder) {
        ventures.push(v);
      }
    }

    render(ventures, students);

  } catch (err) {
    console.error(err);
    document.getElementById("ventures").innerHTML =
      "<p>Error loading ventures. Check console.</p>";
  }
}

function render(ventures, students) {
  let html = "";

  ventures.forEach(v => {
    const key = (v.owner_student_id || "").trim();
    const owner = students[key];
   html += `
  <a href="detail.html?id=${v.id}" class="block">
    <div class="bg-white p-5 rounded-lg shadow hover:shadow-lg transition">
      <h2 class="text-xl font-semibold text-[#002F6C]">
        ${v.name || "Unnamed"}
      </h2>

      <p class="text-sm text-gray-500">
        Stage: ${v.stage || "N/A"}
      </p>

      <p class="mt-3 text-sm">
        ${v.description || ""}
      </p>

      <p class="mt-4 text-xs text-gray-400">
        Founder: ${owner ? owner.name : "Unknown"}
      </p>
    </div>
  </a>
`;

  });

  document.getElementById("ventures").innerHTML = html;
}

loadData();
</script>

</body>
</html>
